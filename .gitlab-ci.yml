image: node:24

stages:
    - build
    - deploy

build:
    stage: build
    script:
        - npm ci
        - npm run build
    artifacts:
        paths:
            - _site
    only:
        - main

pages:
    stage: deploy
    dependencies:
        - build
    script:
        - rm -rf public
        - mv _site public
    artifacts:
        paths:
            - public
    only:
        - main